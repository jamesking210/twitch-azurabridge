services:
  twitch-azurabridge:
    build: .
    image: twitch-azurabridge:local
    container_name: twitch-azurabridge
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
